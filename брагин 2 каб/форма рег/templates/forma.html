<html>
<head>
<style>
    body {    background-color: rgb(233, 233, 233);
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
      justify-content: center;
        align-items: center;
    

    }
    form {
        margin-top: -70px;
    width: 330px;
        padding: 20px;
    background-color: #ffffff; 
        border: solid 1px black;
        border-radius: 10px;
   box-shadow: 0 0 5px black;
        display: flex;
        flex-direction: column;
    }
    h2 {margin-top: 15px;
        text-align: center;
      margin-bottom: 15px;
    }
    label {
        margin-top: 10px;
        margin-bottom: 5px;
       font-weight: bold;
    }
    input {
        width: 100%;
       padding: 8px;
       box-sizing: border-box;
        border-radius: 4px;
        border: 1px solid black;
    }
   button {
    width: 100%;
     padding: 10px;
        margin-top: 30px;
   background-color: rgb(155, 45, 48 );
        color: white;
        border: none;
    border-radius: 5px;
        font-size: 17px;
      cursor: pointer;
      transition: all 0.4s;

    }
    button:hover {
        background-color: rgb(116, 18, 21);
    }
    a {
    margin-bottom: 10px;
    text-align: center;
        margin-top: 15px;
        text-decoration: none;
        color: blue;

    }
</style>
</head>
<body>
<form method="post" action="/">
        <h2>Регистрация</h2>
        <label >Email</label>
        <input type="email"  name="email" placeholder="Email" required>

        <label>Пароль</label>
        <input type="password" name="password" placeholder="Пароль" required>

        <label>Повторите пароль</label>
        <input type="password" name="repeat_password"  placeholder="Повторите пароль" required>

        <label>ФИО</label>
        <input type="text" name="fullname" placeholder="ФИО" required>

        <label>Адрес</label>
        <input type="text"  name="address" placeholder="Адрес" required>

        <button type="submit">Зарегистрироваться</button>
        <a href="#">Войти</a>
    </form>
</body>
</html>
